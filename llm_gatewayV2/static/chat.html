<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Chat · LLM Gateway V2</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #1c212b;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --blue: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --shadow: rgba(1, 4, 9, 0.35);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  header {
    height: 56px;
    padding: 0 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(13, 17, 23, 0.92);
  }
  h1 {
    margin: 0;
    font-size: 16px;
    font-weight: 650;
  }
  nav { display: flex; gap: 14px; align-items: center; }
  nav a {
    color: var(--blue);
    text-decoration: none;
    font-size: 13px;
  }
  nav a:hover { text-decoration: underline; }
  .app {
    height: calc(100% - 56px);
    display: grid;
    grid-template-columns: 280px minmax(0, 1fr);
    min-height: 0;
  }
  aside {
    border-right: 1px solid var(--border);
    background: #0f141d;
    padding: 16px;
    overflow: auto;
  }
  .side-title {
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 0 0 8px;
  }
  select, button, textarea {
    font: inherit;
  }
  select {
    width: 100%;
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 10px;
    outline: none;
  }
  .meta-box {
    margin-top: 14px;
    border: 1px solid var(--border);
    background: var(--panel);
    border-radius: 6px;
    padding: 12px;
    color: var(--muted);
    font-size: 13px;
  }
  .meta-box b { color: var(--text); font-weight: 600; }
  .trace {
    margin-top: 14px;
  }
  .trace-list {
    display: grid;
    gap: 8px;
  }
  .trace-item {
    border: 1px solid var(--border);
    background: var(--panel);
    border-radius: 6px;
    padding: 10px;
    font-size: 12px;
    color: var(--muted);
    overflow-wrap: anywhere;
  }
  .trace-item b { color: var(--text); }
  main {
    min-height: 0;
    display: grid;
    grid-template-rows: minmax(0, 1fr) auto;
  }
  #messages {
    overflow: auto;
    padding: 28px 18px 18px;
  }
  .message {
    max-width: 820px;
    margin: 0 auto 18px;
    display: grid;
    grid-template-columns: 34px minmax(0, 1fr);
    gap: 12px;
  }
  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 6px;
    display: grid;
    place-items: center;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }
  .message.user .avatar {
    background: #14213a;
    color: var(--blue);
  }
  .message.assistant .avatar {
    background: #14351f;
    color: var(--green);
  }
  .bubble {
    padding-top: 4px;
    white-space: pre-wrap;
    overflow-wrap: anywhere;
  }
  .empty {
    height: 100%;
    display: grid;
    place-items: center;
    color: var(--muted);
    text-align: center;
    padding: 24px;
  }
  .empty h2 {
    margin: 0 0 8px;
    color: var(--text);
    font-size: 26px;
    font-weight: 650;
    letter-spacing: 0;
  }
  .empty p { margin: 0; }
  .composer-wrap {
    border-top: 1px solid var(--border);
    background: rgba(13, 17, 23, 0.95);
    padding: 14px 18px 18px;
  }
  .composer {
    max-width: 820px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 10px;
    align-items: end;
  }
  textarea {
    width: 100%;
    min-height: 52px;
    max-height: 180px;
    resize: vertical;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 14px;
    background: var(--panel);
    color: var(--text);
    outline: none;
    box-shadow: 0 8px 22px var(--shadow);
  }
  textarea:focus { border-color: var(--blue); }
  button {
    height: 52px;
    min-width: 96px;
    border: 0;
    border-radius: 8px;
    background: var(--blue);
    color: #fff;
    font-weight: 650;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }
  .hint {
    max-width: 820px;
    margin: 8px auto 0;
    color: var(--muted);
    font-size: 12px;
  }
  .status {
    color: var(--yellow);
    font-size: 12px;
    margin-top: 10px;
  }
  .error { color: var(--red); }
  .pill {
    display: inline-flex;
    align-items: center;
    min-height: 20px;
    padding: 2px 7px;
    border-radius: 999px;
    background: #21262d;
    color: var(--muted);
    font-size: 11px;
    margin: 4px 4px 0 0;
  }
  @media (max-width: 860px) {
    .app { grid-template-columns: 1fr; }
    aside {
      border-right: 0;
      border-bottom: 1px solid var(--border);
      padding: 12px;
      max-height: 230px;
    }
    header { padding: 0 12px; }
    nav a:nth-child(n+3) { display: none; }
    #messages { padding-top: 18px; }
    .message { grid-template-columns: 30px minmax(0, 1fr); }
    .avatar { width: 30px; height: 30px; }
    .composer { grid-template-columns: 1fr; }
    button { width: 100%; }
  }
</style>
</head>
<body>
<header>
  <h1>Agent Chat</h1>
  <nav>
    <a href="/chat">Chat</a>
    <a href="/">Dashboard</a>
    <a href="/help">Help</a>
    <a href="/v1/providers">Providers</a>
  </nav>
</header>

<div class="app">
  <aside>
    <p class="side-title">Gateway</p>
    <select id="provider">
      <option value="">auto failover</option>
    </select>
    <div class="meta-box">
      <div><b>Route:</b> browser -> /agent/chat -> /v1/chat -> MCP tools</div>
      <div style="margin-top:8px;"><b>Tools:</b> add, subtract, get_temperature</div>
      <div id="last-meta" style="margin-top:8px;">No calls yet.</div>
    </div>
    <div class="trace">
      <p class="side-title">Last Run Trace</p>
      <div id="trace-list" class="trace-list"></div>
    </div>
  </aside>

  <main>
    <section id="messages">
      <div class="empty" id="empty">
        <div>
          <h2>Ask the agent</h2>
          <p>Try: What is the temperature in London?</p>
        </div>
      </div>
    </section>

    <section class="composer-wrap">
      <form class="composer" id="chat-form">
        <textarea id="prompt" placeholder="Message the agent..." autocomplete="off"></textarea>
        <button id="send" type="submit">Send</button>
      </form>
      <div class="hint" id="status">All LLM calls are routed through the LLM Gateway.</div>
    </section>
  </main>
</div>

<script>
const form = document.getElementById('chat-form');
const promptBox = document.getElementById('prompt');
const messagesEl = document.getElementById('messages');
const emptyEl = document.getElementById('empty');
const sendButton = document.getElementById('send');
const statusEl = document.getElementById('status');
const providerEl = document.getElementById('provider');
const lastMetaEl = document.getElementById('last-meta');
const traceListEl = document.getElementById('trace-list');

let history = [];

function addMessage(role, content) {
  emptyEl.style.display = 'none';
  const row = document.createElement('div');
  row.className = `message ${role}`;
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'You' : 'AI';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = content;
  row.appendChild(avatar);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

function setBusy(isBusy) {
  sendButton.disabled = isBusy;
  promptBox.disabled = isBusy;
  statusEl.textContent = isBusy ? 'Thinking through the gateway...' : 'All LLM calls are routed through the LLM Gateway.';
  statusEl.className = isBusy ? 'hint status' : 'hint';
}

function renderTrace(trace) {
  traceListEl.innerHTML = '';
  (trace || []).forEach((event) => {
    const item = document.createElement('div');
    item.className = 'trace-item';
    if (event.kind === 'mcp_tools') {
      item.innerHTML = `<b>MCP tools</b><br>${event.tools.map(t => `<span class="pill">${t.name}</span>`).join('')}`;
    } else if (event.kind === 'llm_call') {
      const calls = event.tool_calls || [];
      item.innerHTML = `<b>Turn ${event.turn}: ${event.provider}</b><br>${event.model}<br>${event.latency_ms}ms · in ${event.input_tokens} · out ${event.output_tokens}<br>${calls.length ? calls.map(c => `<span class="pill">${c.name}</span>`).join('') : '<span class="pill">final answer</span>'}`;
    } else if (event.kind === 'tool_call') {
      item.innerHTML = `<b>Tool: ${event.name}</b><br>args: ${escapeHtml(JSON.stringify(event.arguments))}<br>result: ${escapeHtml(event.result)}`;
    }
    traceListEl.appendChild(item);
  });
}

function escapeHtml(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

async function loadProviders() {
  const data = await fetch('/v1/providers').then(r => r.json());
  data.providers.forEach((name) => {
    const opt = document.createElement('option');
    opt.value = name;
    opt.textContent = name;
    providerEl.appendChild(opt);
  });
}

form.addEventListener('submit', async (event) => {
  event.preventDefault();
  const message = promptBox.value.trim();
  if (!message) return;

  addMessage('user', message);
  history.push({ role: 'user', content: message });
  promptBox.value = '';
  const assistantBubble = addMessage('assistant', '');
  setBusy(true);

  try {
    const res = await fetch('/agent/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message,
        history: history.slice(0, -1),
        provider: providerEl.value || null,
        max_turns: 8
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || JSON.stringify(data));

    assistantBubble.textContent = data.answer || '(empty response)';
    history.push({ role: 'assistant', content: data.answer || '' });
    lastMetaEl.innerHTML = `<b>Last provider:</b> ${escapeHtml(data.provider || 'unknown')}<br><b>Model:</b> ${escapeHtml(data.model || 'unknown')}<br><b>Turns:</b> ${data.turns}`;
    renderTrace(data.trace);
  } catch (err) {
    assistantBubble.textContent = `Error: ${err.message}`;
    assistantBubble.classList.add('error');
    statusEl.textContent = err.message;
    statusEl.className = 'hint error';
  } finally {
    setBusy(false);
    promptBox.focus();
  }
});

promptBox.addEventListener('keydown', (event) => {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    form.requestSubmit();
  }
});

loadProviders().catch((err) => {
  statusEl.textContent = err.message;
  statusEl.className = 'hint error';
});
</script>
</body>
</html>
